services:
  postgres:
    image: postgres:18-alpine
    container_name: forze-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${FORZE_DB_NAME:-forze}
      POSTGRES_USER: ${FORZE_DB_USERNAME:-forze}
      POSTGRES_PASSWORD: ${FORZE_DB_PASSWORD:-forze}
    ports:
      - "${FORZE_DB_PORT:-5432}:5432"
    volumes:
      - forze-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORZE_DB_USERNAME:-forze} -d ${FORZE_DB_NAME:-forze}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  forze-postgres-data:
