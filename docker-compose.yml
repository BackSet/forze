services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forze}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${APP_TIME_ZONE:-America/Guayaquil}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - forze-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.139.0
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "${OTEL_HTTP_PORT:-4318}:4318"
    volumes:
      - ./docker/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

volumes:
  forze-postgres-data:
