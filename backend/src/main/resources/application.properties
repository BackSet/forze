debug=false

spring.application.name=forze-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.web.error.whitelabel.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIME_ZONE:America/Guayaquil}
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.url=${FLYWAY_URL}
spring.flyway.user=${FLYWAY_USER}
spring.flyway.password=${FLYWAY_PASSWORD}
spring.thymeleaf.cache=true

server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:never}
management.info.env.enabled=true
management.tracing.enabled=${TRACING_ENABLED:true}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

otel.service.name=${OTEL_SERVICE_NAME:forze-backend}

springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}

logging.pattern.level=%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}]

forze.time-zone=${APP_TIME_ZONE:America/Guayaquil}
forze.identity.enabled=true
forze.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
forze.security.jwt.issuer=${JWT_ISSUER:forze-backend}
forze.security.jwt.secret=${JWT_SECRET}
forze.security.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
forze.security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}
forze.security.refresh-cookie-name=forze_refresh
forze.bootstrap.admin.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
forze.bootstrap.admin.username=${ADMIN_USERNAME:admin}
forze.bootstrap.admin.email=${ADMIN_EMAIL:}
forze.bootstrap.admin.initial-password=${ADMIN_INITIAL_PASSWORD:}
