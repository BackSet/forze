# Load backend/.env (KEY=VALUE) as a property source for local dev so that
# `mvn spring-boot:run`, the IDE and run.sh all resolve DB_*/FLYWAY_*/JWT_* the
# same way. Optional: in prod the real environment variables are used instead.
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.thymeleaf.cache=false

forze.security.cookie-secure=false
forze.security.cookie-same-site=Lax
forze.bootstrap.admin.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
